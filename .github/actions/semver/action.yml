name: Semantic versioning
description: Calculate and update semantic version

inputs:
  project:
    required: true
    description: The project to run the action for - The name of it is assumed to also be the sub-folder's name and the tag prefix

outputs:
  next:
    value: ${{ steps.semver.outputs.next }}
    description: The next calculated version
  changed:
    value: ${{ steps.semver.outputs.next == steps.semver.outputs.current }}
    description: If the version has changed

runs:
  using: composite
  steps:
    - name: Calculate next semantic version
      id: semver
      uses: ietf-tools/semver-action@v1
      continue-on-error: true
      with:
        token: ${{ github.token }}
        fallbackTag: ${{ inputs.project }}/v0.0.0
        branch: master
        prefix: ${{ inputs.project }}/

    - name: Write version to file
      shell: bash
      if: ${{ steps.semver.outcome == 'success' }}
      run: echo "${{ steps.semver.outputs.next }}" > ./${{ inputs.project }}/VERSION

    - name: Commit version file
      if: ${{ steps.semver.outcome == 'success' }}
      uses: EndBug/add-and-commit@v9
      with:
        committer_name: GitHub Actions
        committer_email: actions@github.com
        message: "ci(${{ inputs.project }}): Bump version to ${{ steps.semver.outputs.next }}"
        tag: ${{ steps.semver.outputs.next }}
